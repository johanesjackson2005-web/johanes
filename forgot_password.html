<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>

        body{
            background: #0f172a;
            font-family:Arial;
        }

        .box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            border: 10px solid #a0c4c2;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Forgot Password</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter Email">

        <button type="submit">
            Send OTP
        </button>

    </form>

</div>

</body>
</html>
